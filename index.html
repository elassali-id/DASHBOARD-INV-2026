<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRRO — INVENTAIRE 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root,html[data-theme="light"]{
  --bg:#F7FAFC;--s1:#FFFFFF;--s2:#F8FAFC;--s3:#EDF2F7;--bd:#E2E8F0;--bd2:#CBD5E0;
  --acc:#1A365D;--acc2:#DD6B20;--acc3:#38A169;--amber:#B7791F;--red:#C53030;--blue:#2C5282;
  --tx:#0F2645;--tx2:#2C5282;--tx3:#718096;--gold:#F6CB46;--thead:#EDF2F7;
  --shadow-sm:0 1px 3px rgba(26,54,93,.08);--shadow:0 6px 22px -8px rgba(26,54,93,.16);
  --shadow-lg:0 18px 48px -16px rgba(26,54,93,.24);--grad:linear-gradient(135deg,#1A365D,#2C5282);
  --mono:'IBM Plex Mono',monospace;--sans:'Inter',system-ui,sans-serif;
  --r:8px;--r2:12px;--r3:16px;
  --header-h:54px;--nav-h:42px;
}
html[data-theme="dark"]{
  --bg:#0F172A;--s1:#162033;--s2:#1C2840;--s3:#24324F;--bd:#334155;--bd2:#475569;
  --acc:#5B9BFF;--acc2:#FB923C;--acc3:#4ADE80;--amber:#F6CB46;--red:#F87171;--blue:#60A5FA;
  --tx:#F8FAFC;--tx2:#CBD5E1;--tx3:#94A3B8;--gold:#FFD95A;--thead:#1E293B;
}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;font-size:14px;transition:background .3s,color .3s;overflow-x:hidden}
#loadScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.spinner{width:50px;height:50px;border:3px solid var(--bd);border-top:3px solid var(--acc);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-bar{width:300px;height:6px;background:var(--s3);border-radius:10px;overflow:hidden;margin-top:20px}
.load-fill{width:0%;height:100%;background:var(--grad);transition:width 0.4s}

/* ══ LOGIN ══ */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:9998;display:none;align-items:center;justify-content:center}
.login-box{background:var(--s1);border:1.5px solid var(--bd);border-radius:var(--r3);padding:40px;width:100%;max-width:440px;box-shadow:var(--shadow-lg);text-align:center}
.login-zone-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:20px 0}
.zone-btn{border:1.5px solid var(--bd);border-radius:var(--r2);padding:15px 5px;cursor:pointer;background:var(--s2);transition:.18s}
.zone-btn.sel{border-color:var(--acc);background:var(--s3);box-shadow:0 0 0 4px rgba(26,54,93,0.1)}
.admin-zone { border: 2px solid #f5cc72; background: #fffbea; color: #854f0b; width: 100%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border-radius: var(--r2); cursor: pointer; }

/* ══ HEADER ══ */
header{background:var(--s1);border-bottom:1.5px solid var(--bd);height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:400;box-shadow:var(--shadow-sm)}
.logo-area{display:flex;align-items:center;min-width:320px;gap:15px;flex-shrink:0}
nav{background:var(--s1);border-bottom:1.5px solid var(--bd);display:flex;padding:0 24px;height:var(--nav-h);position:sticky;top:var(--header-h);z-index:390}
.tab{font-family:var(--mono);font-size:11px;font-weight:600;padding:0 20px;height:100%;cursor:pointer;color:var(--tx3);border:none;background:none;border-bottom:3px solid transparent;transition:.2s;display:flex;align-items:center}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}

/* ══ MAIN ══ */
main{padding:0!important;width:100%;max-width:100%!important}
.panel:not(#panel-tableau){padding:20px}
#panel-tableau{display:none;flex-direction:column;height:calc(100vh - var(--header-h) - var(--nav-h));overflow:hidden;width:100%}
#panel-tableau.on{display:flex}
.tbl-hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:15px;position:sticky;top:0;z-index:280;width:100%;box-shadow:var(--shadow-sm);flex-shrink:0}
.tbl-body-wrap{flex:1;min-height:0;display:flex;flex-direction:column;overflow:auto;background:var(--s1);width:100%}
table{width:100%;border-collapse:separate;border-spacing:0;table-layout:auto}
thead th{background:var(--thead);padding:12px 15px;text-align:left;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;border-bottom:1.5px solid var(--bd);white-space:nowrap;position:sticky;top:0;z-index:150;box-shadow:0 2px 0 var(--bd)}
td{padding:10px 15px;border-bottom:1px solid var(--bd);font-size:12px;white-space:nowrap}

/* ACTIONS */
.btn-edit-row{background:color-mix(in srgb,var(--blue) 12%,var(--s1));border:1px solid var(--blue);color:var(--blue);border-radius:5px;padding:3px 8px;font-size:10px;cursor:pointer}
.btn-del-row{background:color-mix(in srgb,var(--red) 12%,var(--s1));border:1px solid var(--red);color:var(--red);border-radius:5px;padding:3px 8px;font-size:10px;cursor:pointer;margin-left:4px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--s1);border:1.5px solid var(--bd);border-radius:var(--r2);padding:18px;border-top:4px solid var(--c);box-shadow:var(--shadow-sm)}
.kpi-val{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--c)}

/* UTILS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:var(--r);font-size:12px;font-family:var(--mono);font-weight:600;cursor:pointer;border:none}
.btn-acc{background:var(--grad);color:white}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--tx3)}
.toast{position:fixed;bottom:30px;right:30px;background:var(--acc3);color:white;padding:12px 20px;border-radius:var(--r);font-family:var(--mono);font-size:12px;opacity:0;transition:.3s;z-index:9999}
.toast.show{opacity:1;transform:translateY(0)}
.obs-ok{background:color-mix(in srgb,var(--acc3) 15%,var(--s1));color:var(--acc3);border:1px solid var(--acc3);padding:2px 8px;border-radius:5px;font-weight:700;font-size:10px}
.obs-av{background:color-mix(in srgb,var(--amber) 15%,var(--s1));color:var(--amber);border:1px solid var(--amber);padding:2px 8px;border-radius:5px;font-weight:700;font-size:10px}
.obs-disc{background:color-mix(in srgb,var(--red) 15%,var(--s1));color:var(--red);border:1px solid var(--red);padding:2px 8px;border-radius:5px;font-weight:700;font-size:10px}

@media print {
  header, nav, .tbl-hdr, #loginScreen, #loadScreen { display:none !important }
  #panel-overview { display:block !important; width:100% !important; }
}
</style>
</head>
<body class="dark-theme">

<!-- LOADING -->
<div id="loadScreen">
    <div style="text-align:center">
        <div style="font-family:var(--mono); font-size:40px; font-weight:800; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:0.2em">DRRO</div>
        <div class="spinner"></div>
        <div class="load-bar"><div class="load-fill" id="loadFill"></div></div>
        <div id="loadStatus" style="font-family:var(--mono); font-size:12px; color:var(--tx3); margin-top:15px">Synchronisation Drive...</div>
    </div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
    <div class="login-box">
        <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMjAgOTAiPgogIDx0ZXh0IHg9IjE2MCIgeT0iMzQiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJzZXJpZiIgZm9udC1zaXplPSIyMiIgZm9udC13ZWlnaHQ9IjcwMCIgZmlsbD0iIzFhMmY2ZSI+2KfZhNfYsdmCINin2YTYs9mK2KfYsdipPC90ZXh0PgogIDxsaW5lIHgxPSI2MCIgeTE9IjQ1IiB4Mj0iMjYwIiB5Mj0iNDUiIHN0cm9rZT0iIzFhMmY2ZSIgc3Ryb2tlLXdpZHRoPSIwLjgiLz4KICA8dGV4dCB4PSIxNjAiIHk9IjY4IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0ic2VyaWYiIGZvbnQtc2l6ZT0iMTciIGZvbnQtd2VpZ2h0PSI2MDAiIGZpbGw9IzFhMmY2ZT5BdXRvcm91dGVzIGR1IE1hcm9jPC90ZXh0Pgo8L3N2Zz4=" style="height:65px; margin-bottom:15px">
        <div class="login-zone-grid">
            <div class="zone-btn" id="zb-CEBS" onclick="selZone('CEBS')"><div class="zone-btn-icon">📘</div><div class="zone-btn-label">CEBS</div></div>
            <div class="zone-btn" id="zb-CEJ" onclick="selZone('CEJ')"><div class="zone-btn-icon">📗</div><div class="zone-btn-label">CEJ</div></div>
            <div class="zone-btn" id="zb-AEBB" onclick="selZone('AEBB')"><div class="zone-btn-icon">📙</div><div class="zone-btn-label">AEBB</div></div>
        </div>
        <div class="admin-zone" id="zb-ADMIN" onclick="selZone('ADMIN')">🧭 TOUTES ZONES (ADMIN)</div>
        <div id="loginErr" style="color:var(--red); font-size:12px; margin-bottom:10px; display:none;">Code incorrect</div>
        <input type="password" id="passInput" placeholder="Code d'accès" onkeydown="if(event.key==='Enter')doLogin()" style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--bd); margin-bottom:15px; background:var(--s2); color:var(--tx)">
        <button class="login-btn btn-acc" onclick="doLogin()">Se connecter</button>
    </div>
</div>

<!-- APP SHELL -->
<div id="appShell" style="display:none">
    <header>
        <div class="logo-area">
            <div class="logo-txt"><span style="color:var(--acc)">DRRO</span> / 2026 / <span id="hdrZone" style="color:var(--gold)"></span></div>
            <div class="status-dot" id="statusDot"></div>
        </div>
        <div class="hdr-right">
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
            <button class="btn btn-out" onclick="reloadData()">↺ Actualiser</button>
            <button class="btn" style="color:var(--red)" onclick="logout()">⎋ Quitter</button>
        </div>
    </header>

    <nav id="mainNav"></nav>

    <main>
        <div id="panel-overview" class="panel on">
            <div class="sec-title">Indicateurs — <span id="ovZoneLabel"></span></div>
            <div class="kpi-grid" id="kpiContainer"></div>
            <div class="charts-grid">
                <div class="card"><div class="card-title">Répartition Observations</div><canvas id="cObs" height="250"></canvas></div>
                <div class="card"><div class="card-title">Articles par Inventoriste</div><canvas id="cInv" height="250"></canvas></div>
            </div>
        </div>

        <div id="panel-tableau" class="panel">
            <div class="tbl-hdr">
                <span id="tblCount" style="font-family:var(--mono); font-size:11px; color:var(--tx3)"></span>
                <div style="display:flex; gap:10px">
                    <button class="btn btn-acc btn-sm" id="btnAddRow" style="display:none" onclick="openAddModal()">+ Ajouter</button>
                    <input type="text" id="srch" placeholder="🔍 Recherche..." oninput="applyFilters()" style="width:200px">
                    <select id="fObs" onchange="applyFilters()"><option value="">Observations</option><option value="CONFORME">Conforme</option><option value="A VERIFIER">À vérifier</option><option value="DISCORDANCE">Discordance</option></select>
                    <button class="btn btn-out btn-sm" onclick="exportFiltered()">↓ Excel</button>
                </div>
            </div>
            <div class="tbl-body-wrap"><table><thead id="tblHead"></thead><tbody id="tBody"></tbody></table></div>
            <div class="pag"><span id="pagInfo"></span><div id="pagBtns"></div></div>
        </div>

        <div id="panel-telechargement" class="panel">
            <div class="sec-title">Fichiers source Excel</div>
            <div id="dlGrid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:15px"></div>
        </div>
    </main>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
        <div id="modalTitle" style="font-weight:700; margin-bottom:20px">Détails</div>
        <div class="modal-grid" id="modalFields"></div>
        <div style="display:flex; gap:10px; margin-top:20px; justify-content:flex-end">
            <button class="btn btn-out" onclick="closeModal()">Annuler</button>
            <button class="btn btn-acc" onclick="submitModal()">Enregistrer</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
// CONFIGURATION API
const API_URL = "https://script.google.com/macros/s/AKfycbw6Tj_vI5-H6fOa5B-1aK1Z3yW9eA2Z_eW9v_eE_vE/exec"; 
const API_TOKEN = "DRRO_2026_IDRISS_SECRET"; 

const ZONE_CONFIG = {
  CEBS: { pass:"Y2ViczIwMjY=", id:"1hGZL1ZLk37rIB6C2u15WxqTloAuO6WaCpLICQIKdiUY", color:"#1a4fa8" },
  CEJ:  { pass:"Y2VqMjAyNg==", id:"1G-TJ1MVf0pA2bnQbMdppSt8HiczPlOgG", color:"#5b3dc4" },
  AEBB: { pass:"YWViYjIwMjY=", id:"1ORIJXPdWMeADALzeElDvxUl_Fqy3Nfwv", color:"#1d9e75" },
  ADMIN:{ pass:"ZHJyb0BhZG1pbjIwMjY=", color:"#c8951a" }
};

let STATE = { zone: null, isAdmin: false, data: [], filtered: [], charts: {}, headers: [], pgSize: 50, page: 1 };

function selZone(z) {
    STATE.zone = z;
    document.querySelectorAll('.zone-btn, .admin-zone').forEach(b => b.classList.remove('sel'));
    const btn = document.getElementById(z === 'ADMIN' ? 'zb-ADMIN' : 'zb-' + z);
    if(btn) btn.classList.add('sel');
}

function doLogin() {
    const input = document.getElementById('passInput').value.trim();
    if(!STATE.zone || !input) return;
    if(btoa(input) === ZONE_CONFIG[STATE.zone].pass) {
        localStorage.setItem('drro_session_v6', JSON.stringify({z: STATE.zone, t: Date.now()}));
        launchApp();
    } else { document.getElementById('loginErr').style.display='block'; }
}

async function launchApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appShell').style.display = 'block';
    STATE.isAdmin = (STATE.zone === 'ADMIN');
    document.getElementById('hdrZone').textContent = STATE.zone;
    document.getElementById('btnAddRow').style.display = STATE.isAdmin ? 'inline-flex' : 'none';
    buildNav(); buildDlSection(); reloadData();
}

function buildNav() {
    document.getElementById('mainNav').innerHTML = `<button class="tab on" onclick="showTab('overview')">Vue d'ensemble</button><button class="tab" onclick="showTab('tableau')">Données</button><button class="tab" onclick="showTab('telechargement')">Téléchargement</button>`;
}

async function reloadData() {
    const screen = document.getElementById('loadScreen');
    screen.style.display = 'flex';
    document.getElementById('loadFill').style.width = "30%";
    
    // Timeout de sécurité : si ça bloque 10s, on force l'entrée
    const safetyTimeout = setTimeout(() => {
        if(screen.style.display !== 'none') {
            screen.style.display = 'none';
            toast("Erreur de synchronisation Drive (Vérifiez les permissions)", "err");
        }
    }, 10000);

    const zones = STATE.isAdmin ? ['CEBS','CEJ','AEBB'] : [STATE.zone];
    STATE.data = [];
    
    for(let z of zones) {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${ZONE_CONFIG[z].id}/export?format=xlsx`);
            const buf = await res.arrayBuffer();
            const wb = XLSX.read(buf);
            const json = XLSX.utils.sheet_to_json(wb.Sheets['ARTICLES'] || wb.Sheets[0], {defval:''});
            if(!STATE.headers.length) STATE.headers = Object.keys(json[0]||{});
            STATE.data = STATE.data.concat(json.map((r, i) => ({ ...r, Source: z, _rowIdx: i + 2 })));
        } catch(e) { console.error(e); }
    }
    
    clearTimeout(safetyTimeout);
    document.getElementById('loadFill').style.width = "100%";
    setTimeout(() => { screen.style.display='none'; updateUI(); }, 500);
}

function updateUI() {
    const d=STATE.data, n=d.length;
    const ok=d.filter(r => String(r.Observation).toUpperCase().includes('CONFORME')).length;
    document.getElementById('kpiContainer').innerHTML = `
        <div class="kpi" style="--kpi-color:var(--acc)"><div class="kpi-label">Articles</div><div class="kpi-val">${n}</div></div>
        <div class="kpi" style="--kpi-color:var(--acc3)"><div class="kpi-label">Conformes</div><div class="kpi-val">${ok}</div></div>
    `;
    renderCharts(); applyFilters();
}

function renderCharts() {
  const d=STATE.data;
  if(STATE.charts.cObs) STATE.charts.cObs.destroy();
  STATE.charts.cObs = new Chart(document.getElementById('cObs'), {
    type:'doughnut', data:{ labels:['Conforme','Autres'], datasets:[{data:[d.filter(r=>String(r.Observation).includes('CONFORME')).length, d.length], backgroundColor:['#38A169','#E2E8F0']}] }, options:{maintainAspectRatio:false}
  });
}

function applyFilters() {
    const q = document.getElementById('srch').value.toLowerCase();
    const obs = document.getElementById('fObs').value;
    STATE.filtered = STATE.data.filter(r => {
        if(obs && !String(r.Observation).toUpperCase().includes(obs)) return false;
        if(q && !Object.values(r).some(v => String(v).toLowerCase().includes(q))) return false;
        return true;
    });
    renderTable();
}

function renderTable() {
    const cols = ['ID_Immobilisation', 'Lib_Article', 'NumSerie', 'Observation', 'Gare'];
    const h = document.getElementById('tblHead');
    const b = document.getElementById('tBody');
    h.innerHTML = `<tr>${(STATE.isAdmin ? '<th>ACTIONS</th>' : '')}${cols.map(c => `<th>${c}</th>`).join('')}</tr>`;
    const slice = STATE.filtered.slice((STATE.page-1)*STATE.pgSize, STATE.page*STATE.pgSize);
    b.innerHTML = slice.map(r => `<tr>${STATE.isAdmin ? `<td><button class="btn-edit-row" onclick="openEditModal(${STATE.data.indexOf(r)})">✏</button></td>` : ''}${cols.map(c => `<td>${r[c]||'-'}</td>`).join('')}</tr>`).join('');
    document.getElementById('tblCount').textContent = `${STATE.filtered.length} articles`;
}

function showTab(id) {
    document.querySelectorAll('.panel, .tab').forEach(el => el.classList.remove('on'));
    document.getElementById('panel-'+id).classList.add('on');
    const tabs = document.querySelectorAll('.tab');
    if(id==='overview') tabs[0].classList.add('on'); else if(id==='tableau') tabs[1].classList.add('on'); else tabs[2].classList.add('on');
}

function closeModal(){ document.getElementById('modalOverlay').style.display='none'; }
function toast(m,t=""){ const el=document.getElementById('toast'); el.textContent=m; el.className='toast show '+(t==='err'?'err':''); setTimeout(()=>el.classList.remove('show'),3000); }
function toggleTheme(){ const h=document.documentElement; h.setAttribute('data-theme', h.getAttribute('data-theme')==='dark'?'light':'dark'); }
function logout(){ localStorage.removeItem('drro_session_v6'); location.reload(); }

window.onload=()=>{
    const s = JSON.parse(localStorage.getItem('drro_session_v6'));
    if(s && (Date.now()-s.t < 8*3600*1000)){ STATE.zone=s.z; launchApp(); }
    else document.getElementById('loginScreen').style.display='flex';
}
</script>
</body>
</html>
