function formatDateToFrench(date) {
  if (!date) return '—';
  const d = date instanceof Date ? date : new Date(date);
  if (isNaN(d.getTime())) return '—';
  const jour = d.getDate().toString().padStart(2, '0');
  const mois = (d.getMonth() + 1).toString().padStart(2, '0');
  const annee = d.getFullYear();
  const heures = d.getHours().toString().padStart(2, '0');
  const minutes = d.getMinutes().toString().padStart(2, '0');
  const secondes = d.getSeconds().toString().padStart(2, '0');
  return `${jour}/${mois}/${annee} ${heures}:${minutes}:${secondes}`;
}

function isFrenchDateTime(str) {
  if (!str) return false;
  return /^\d{2}\/\d{2}\/\d{4} \d{2}:\d{2}:\d{2}$/.test(str);
}

async function generateBDD_DRRO() {
  if (!isAdmin) {
    toast('Accès réservé à l\'administrateur', 'err');
    return;
  }
  
  if (zoneData.length === 0) {
    toast('Aucune donnée disponible. Veuillez d\'abord charger les zones.', 'err');
    return;
  }
  
  toast('⏳ Génération de BDD-DRRO.xlsx en cours...', 'info');
  
  try {
    // Récupérer les données par zone
    const zones = ['CEBS', 'CEJ', 'AEBB'];
    const zonesData = {};
    let allHeaders = [];
    
    for (const zone of zones) {
      const zoneRows = zoneData.filter(r => r.Source === zone);
      zonesData[zone] = zoneRows;
      
      // Collecter tous les en-têtes uniques
      zoneRows.forEach(row => {
        Object.keys(row).forEach(key => {
          if (key !== 'Source' && !allHeaders.includes(key)) {
            allHeaders.push(key);
          }
        });
      });
    }
    
    // Trier les en-têtes dans l'ordre souhaité
    const orderedHeaders = [
      'ID_Immobilisation', 'ID_Imobilisation', 'ID Immobilisation',
      'Lib_Article', 'Libellé article',
      'NumSerie', 'Numerie', 'COM-ALU',
      'Lib_Modele', 'Modele', 'Modèle',
      'Lib_Marque', 'Marque',
      'Localisation', 'Emplacement',
      'Gare',
      'Date MAJ', 'Date_inventaire', 'Date d\'inventaire',
      'Inventoriste',
      'Observation',
      'Cod_Article', 'Code article',
      'Marche', 'N° Marché',
      'PU', 'Prix',
      'Date_modification', 'Date de modification'
    ];
    
    // Compléter avec les en-têtes manquants
    orderedHeaders.forEach(h => {
      if (!allHeaders.includes(h) && h) allHeaders.unshift(h);
    });
    allHeaders = [...new Set([...orderedHeaders, ...allHeaders])].filter(h => h && h !== 'Source');
    
    // Créer un nouveau classeur
    const wb = XLSX.utils.book_new();
    
    // Styles pour la mise en page (en-têtes)
    const headerStyle = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "1A365D" } }, alignment: { horizontal: "center" } };
    
    // Pour chaque zone, créer une feuille
    for (const zone of zones) {
      const data = zonesData[zone];
      if (data.length === 0) {
        // Feuille vide avec juste les en-têtes
        const emptySheet = XLSX.utils.json_to_sheet([], { header: allHeaders });
        XLSX.utils.book_append_sheet(wb, emptySheet, `${zone}_ALL`);
        continue;
      }
      
      // Transformer les données pour la feuille
      const sheetData = data.map(row => {
        const newRow = {};
        allHeaders.forEach(header => {
          let value = row[header];
          if (value === undefined) {
            // Chercher des variantes du nom de colonne
            const possibleKeys = [
              header,
              header.toLowerCase(),
              header.toUpperCase(),
              header.replace(/_/g, ' '),
              header.replace(/ /g, '_')
            ];
            for (const key of possibleKeys) {
              if (row[key] !== undefined) {
                value = row[key];
                break;
              }
            }
          }
          newRow[header] = (value === undefined || value === null) ? '' : value;
        });
        return newRow;
      });
      
      // Créer la feuille
      const ws = XLSX.utils.json_to_sheet(sheetData, { header: allHeaders });
      
      // Ajuster les largeurs de colonnes
      ws['!cols'] = allHeaders.map(header => {
        let maxLen = header.length;
        sheetData.forEach(row => {
          const val = row[header] ? row[header].toString() : '';
          if (val.length > maxLen) maxLen = Math.min(val.length, 50);
        });
        return { wch: Math.min(35, Math.max(12, maxLen + 2)) };
      });
      
      XLSX.utils.book_append_sheet(wb, ws, `${zone}_ALL`);
    }
    
    // Exporter le fichier
    XLSX.writeFile(wb, `BDD-DRRO_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.xlsx`);
    toast('✓ BDD-DRRO.xlsx généré avec succès !', '');
    
  } catch (error) {
    console.error('Erreur génération BDD-DRRO:', error);
    toast('Erreur lors de la génération: ' + error.message, 'err');
  }
}

function saveSession(z) {
  try { localStorage.setItem(SESSION_KEY, JSON.stringify({ zone: z, expiry: Date.now() + SESSION_HOURS * 3600000 })); } catch (e) {}
}

function clearSession() {
  try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
}

function readSession() {
  try {
    const r = localStorage.getItem(SESSION_KEY);
    if (!r) return null;
    const s = JSON.parse(r);
    if (!s || Date.now() > s.expiry) {
      clearSession();
      return null;
    }
    return s;
  } catch (e) { return null; }
}

function startSessionCountdown(expiry) {
  if (isAdmin) {
    const b = document.getElementById('sessionExpiryBadge');
    if (b) b.style.display = 'none';
    return;
  }
  if (sessionExpiryInterval) clearInterval(sessionExpiryInterval);
  const badge = document.getElementById('sessionExpiryBadge');
  if (!badge) return;
  const tick = () => {
    const rem = expiry - Date.now();
    if (rem <= 0) {
      clearInterval(sessionExpiryInterval);
      toast('Session expirée', 'err');
      setTimeout(doLogout, 1500);
      return;
    }
    badge.style.display = '';
    const h = Math.floor(rem / 3600000), m = Math.floor((rem % 3600000) / 60000);
    badge.textContent = h > 0 ? `⏱ ${h}h${String(m).padStart(2, '0')}` : `⏱ ${m}min`;
    badge.style.color = rem < 600000 ? 'var(--amber)' : 'var(--tx3)';
    badge.style.borderColor = rem < 600000 ? 'var(--amber)' : 'var(--bd)';
  };
  tick();
  sessionExpiryInterval = setInterval(tick, 30000);
}

async function sha256Hex(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2, '0')).join('');
}

async function doLogin() {
  const err = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  const pwd = document.getElementById('loginPwd').value.trim();
  
  if (!selectedLoginZone) {
    if (err) { err.textContent = 'Veuillez sélectionner une zone.'; err.style.display = 'block'; }
    return;
  }
  
  if (btn) btn.disabled = true;
  if (btn) btn.textContent = 'Vérification...';
  
  const hash = await sha256Hex(pwd);
  
  if (btn) { btn.disabled = false; btn.textContent = 'Accéder →'; }
  
  const cfg = ZONE_CONFIG[selectedLoginZone];
  if (!cfg || hash !== cfg.pwdHash) {
    if (err) { err.textContent = 'Code incorrect pour : ' + selectedLoginZone; err.style.display = 'block'; }
    const pwdField = document.getElementById('loginPwd');
    if (pwdField) pwdField.value = '';
    return;
  }
  
  if (err) err.style.display = 'none';
  currentZone = selectedLoginZone;
  isAdmin = (currentZone === 'ADMIN');
  saveSession(currentZone);
  launchApp();
  const s = readSession();
  if (s) startSessionCountdown(s.expiry);
}

async function reloadData() {

  isLoading = true;
  
  const refreshBtn = document.getElementById('refreshBtn');
  if (refreshBtn) refreshBtn.classList.add('spinning');
  
  clearUpdateAlert();
  zoneData = [];

  sourceHeaders = [];
  locCol = null;

  setStatus('Chargement...', false);
  
  try {
    if (isAdmin) await loadAdminData();
    else await loadSingleZone(currentZone);

    showErrorBanner('Erreur de chargement: ' + error.message);
    setStatus('Erreur de chargement', false);
  } finally {

}

function displayZoneErrors() {
  const errorBanner = document.getElementById('errorBanner');
  if (!errorBanner) return;
  const errors = Object.values(zoneLoadErrors);
  if (errors.length > 0 && !isAdmin) {
    errorBanner.style.display = 'block';

      ${errors.join('<br>')}
      <button onclick="reloadData()">Réessayer</button>
    `;
  } else {
    errorBanner.style.display = 'none';
  }
}

  if (errorBanner) {
    errorBanner.style.display = 'block';
    errorBanner.innerHTML = `<strong>⚠️ Erreur</strong><br>${msg}<button onclick="reloadData()">Réessayer</button>`;
  }
}

async function loadSingleZone(zone) {
  setProgress(20, `Chargement ${zone}...`);
  try {
    const url = EXPORT_URL(ZONE_CONFIG[zone].sheetId);
    const response = await fetch(url, { mode: 'cors' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const buf = await response.arrayBuffer();
    const { rows, headers } = parseXLSX(buf);
    
    if (!rows || rows.length === 0) throw new Error('Aucune donnée trouvée');
    
    sourceHeaders = headers;
    zoneData = rows.map(r => ({ ...r, Source: zone }));
    lastCounts[zone] = rows.length;
    setProgress(100, 'OK');
    
    const loadScreen = document.getElementById('loadScreen');
    if (loadScreen) loadScreen.style.display = 'none';
    
    updateAll();
    setStatus(`${zone} — ${fmt(rows.length)} articles`, true);
    startUpdateWatcher();
  } catch (e) {
    console.error(`Erreur chargement ${zone}:`, e);
    zoneLoadErrors[zone] = `Impossible de charger ${zone}: ${e.message}`;
    
    const loadScreen = document.getElementById('loadScreen');
    if (loadScreen) loadScreen.style.display = 'none';
    
    showManualUpload(zone);
    setStatus(`Fichier ${zone} non accessible`, false);
    toast(`Erreur chargement ${zone}: ${e.message}`, 'err');
  }
}

async function loadAdminData() {
  const zones = ['CEBS', 'CEJ', 'AEBB'];
  let hdrUnion = [];
  let loadedCount = 0;
  
  for (let i = 0; i < zones.length; i++) {
    const zone = zones[i];
    setProgress(10 + i * 28, `Chargement ${zone}...`);
    try {
      const buf = await fetchBuf(EXPORT_URL(ZONE_CONFIG[zone].sheetId));
      const { rows, headers } = parseXLSX(buf);
      headers.forEach(h => { if (h && !hdrUnion.includes(h)) hdrUnion.push(h); });
      zoneData = zoneData.concat(rows.map(r => ({ ...r, Source: zone })));
      lastCounts[zone] = rows.length;
      loadedCount++;
    } catch (e) {
      console.error(`Erreur chargement ${zone}:`, e);
      zoneLoadErrors[zone] = `${zone}: ${e.message}`;
      lastCounts[zone] = null;
    }
  }
  
  sourceHeaders = hdrUnion;
  setProgress(100, 'OK');
  
  const loadScreen = document.getElementById('loadScreen');
  if (loadScreen) loadScreen.style.display = 'none';
  
  if (zoneData.length > 0) {
    updateAll();
    setStatus(`Admin — ${fmt(zoneData.length)} articles (${loadedCount}/3 zones)`, loadedCount > 0);
    startUpdateWatcher();
    if (loadedCount < 3) {
      showErrorBanner(`${3 - loadedCount} zone(s) non accessible(s). Vérifiez les accès Google Sheets.`);
    }
  } else {
    setStatus('Aucun fichier accessible', false);
    showErrorBanner('Impossible de charger les données. Vérifiez que les Google Sheets sont partagés.');
  }
}

async function fetchBuf(url) {
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 30000);
  try {
    const res = await fetch(url, { mode: 'cors', signal: controller.signal });
    clearTimeout(timeoutId);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.arrayBuffer();
  } catch (e) {
    clearTimeout(timeoutId);
    throw e;
  }
}

function parseXLSX(buf) {
  const wb = XLSX.read(buf, {type:'array',cellDates:true});
  const ws = wb.Sheets['ARTICLES']||wb.Sheets[wb.SheetNames[0]];
  let rows = XLSX.utils.sheet_to_json(ws,{defval:''});
  const hr = XLSX.utils.sheet_to_json(ws,{header:1})[0]||[];
  let headers = hr.map(h=>(h==null?'':h.toString())).filter(h=>h!=='');
  if(!headers.length&&rows.length)headers=Object.keys(rows[0]);
  
  rows = rows.map(row => {
    const cleanedRow = {};
    for (const key in row) {
      let value = row[key];
      if (value instanceof Date && !isNaN(value.getTime())) {
        cleanedRow[key] = formatDateToFrench(value);
      } else if (typeof value === 'string' && value.includes('GMT') && value.includes('202')) {
        const parsed = new Date(value);
        if (!isNaN(parsed.getTime())) {
          cleanedRow[key] = formatDateToFrench(parsed);
        } else {
          cleanedRow[key] = value;
        }
      } else {
        cleanedRow[key] = value;
      }
    }
    return cleanedRow;
  });
  
  return{rows, headers};
}

function showManualUpload(zone) {
  const alertZone = document.getElementById('alertZone');
  if (alertZone) {
    alertZone.innerHTML = `<div class="alert update" style="margin-top:12px">
      <div>📂</div>
      <div>
        <strong>Fichier ${zone} non accessible</strong><br>
        Veuillez télécharger manuellement le fichier Excel.
        <input type="file" id="manualInput" accept=".xlsx" style="display:none" onchange="handleManual(this.files[0])">
        <button class="btn-refresh-inline" style="margin-top:8px" onclick="document.getElementById('manualInput').click()">
          📁 Sélectionner le fichier ${zone}.xlsx
        </button>
      </div>
    </div>`;
  }
}

function handleManual(file) {
  if (!file) return;
  const zone = isAdmin ? (['CEBS', 'CEJ', 'AEBB'].find(z => file.name.toUpperCase().includes(z)) || 'CEBS') : currentZone;
  const reader = new FileReader();
  reader.onload = e => {
    const { rows, headers } = parseXLSX(e.target.result);
    if (!sourceHeaders.length) sourceHeaders = headers;
    zoneData = zoneData.filter(r => r.Source !== zone).concat(rows.map(r => ({ ...r, Source: zone })));
    lastCounts[zone] = rows.length;
    updateAll();
    setStatus((isAdmin ? 'Admin' : 'Zone ' + zone) + ' — ' + fmt(zoneData.length) + ' articles', true);
    toast(zone + ' chargé — ' + rows.length + ' articles');
    const alertZone = document.getElementById('alertZone');
    if (alertZone) alertZone.innerHTML = '';
  };
  reader.onerror = () => toast('Erreur de lecture du fichier', 'err');
  reader.readAsArrayBuffer(file);
}

function startUpdateWatcher() {
  if (updateCheckInterval) clearInterval(updateCheckInterval);
  updateCheckInterval = setInterval(async () => {
    const zones = isAdmin ? ['CEBS', 'CEJ', 'AEBB'] : [currentZone];
    const changed = [];
    for (const zone of zones) {
      if (lastCounts[zone] == null) continue;
      try {
        const buf = await fetchBuf(EXPORT_URL(ZONE_CONFIG[zone].sheetId));
        const { rows } = parseXLSX(buf);
        if (rows.length !== lastCounts[zone]) changed.push(`${zone} (${lastCounts[zone]}→${rows.length})`);
      } catch (e) {}
    }
    const updateAlert = document.getElementById('updateAlertZone');
    if (updateAlert) {
      if (changed.length) {
        updateAlert.innerHTML = `<div class="alert update"><div class="alert-icon">🔄</div><div><p><strong>Mise à jour détectée !</strong> ${changed.join(', ')}</p><button class="btn-refresh-inline" onclick="reloadData()">↺ Actualiser</button></div></div>`;
      } else {
        updateAlert.innerHTML = '';
      }
    }
  }, 120000);
}

function clearUpdateAlert() {
  const z = document.getElementById('updateAlertZone');
  if (z) z.innerHTML = '';
}

function setProgress(p, m) {
  const fill = document.getElementById('loadFill');
  const status = document.getElementById('loadStatus');
  if (fill) fill.style.width = p + '%';
  if (status) status.textContent = m;
}

function setStatus(txt, ok) {
  const statusTxt = document.getElementById('statusTxt');
  const dot = document.getElementById('statusDot');
  if (statusTxt) statusTxt.textContent = txt;
  if (dot) {
    dot.style.background = ok ? 'var(--acc3)' : 'var(--amber)';
    dot.style.boxShadow = ok ? '0 0 6px var(--acc3)' : '0 0 6px var(--amber)';
  }
}

const obsVal = r => (r.Observation || '').toString().toUpperCase().trim();
const gareVal = r => (r.Gare || '').toString().trim();
const invVal = r => (r.Inventoriste || '').toString().trim().replace(/\s+/g, ' ');

function findLocCol() {
  locCol = sourceHeaders.find(h => /local/i.test(h)) || null;
}

const locVal = r => locCol ? (r[locCol] || '').toString().trim() : '';
const isOk = r => obsVal(r) === 'CONFORME';
const isAv = r => obsVal(r) === 'A VERIFIER';
const isDisc = r => obsVal(r).startsWith('DISCORDANCE');
const isNd = r => !obsVal(r);

function updateAll() {
  buildKPIs();

}

function buildKPIs() {

  const disc = d.filter(isDisc).length;
  const nd = d.filter(isNd).length;
  
  set('kTotal', fmt(n));

  set('kOkP', pct(ok, n) + ' du total');
  set('kAv', fmt(av));
  set('kAvP', pct(av, n) + ' du total');

}

function destroy(id) {
  if (charts[id]) {
    try { charts[id].destroy(); } catch (e) {}
    delete charts[id];
  }
}

function captureFilters() {
  savedFilters = {
    src: document.getElementById('fSrc')?.value || '',
    obs: document.getElementById('fObs')?.value || '',
    gare: document.getElementById('fGare')?.value || '',
    loc: document.getElementById('fLoc')?.value || '',
    inv: document.getElementById('fInv')?.value || '',
    srch: document.getElementById('srch')?.value || ''
  };
  savedPage = page;
}

function restoreFilters() {
  if (!savedFilters) return;
  const fSrc = document.getElementById('fSrc');
  if (fSrc) fSrc.value = savedFilters.src || '';
  const fObs = document.getElementById('fObs');
  if (fObs) fObs.value = savedFilters.obs || '';
  const fGare = document.getElementById('fGare');
  if (fGare) fGare.value = savedFilters.gare || '';
  const fLoc = document.getElementById('fLoc');
  if (fLoc) fLoc.value = savedFilters.loc || '';
  const fInv = document.getElementById('fInv');
  if (fInv) fInv.value = savedFilters.inv || '';
  const srch = document.getElementById('srch');
  if (srch) srch.value = savedFilters.srch || '';
}

function populateFilters() {
  findLocCol();
  const gares = [...new Set(zoneData.map(gareVal).filter(Boolean))].sort((a, b) => +a - +b);
  const invs = [...new Set(zoneData.map(invVal).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' }));
  const locs = [...new Set(zoneData.map(locVal).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'fr', { numeric: true, sensitivity: 'base' }));
  
  const prevGare = document.getElementById('fGare')?.value || '';
  const prevInv = document.getElementById('fInv')?.value || '';
  const prevLoc = document.getElementById('fLoc')?.value || '';
  
  const fGare = document.getElementById('fGare');
  if (fGare) fGare.innerHTML = '<option value="">Toutes gares</option>' + gares.map(g => `<option value="${esc(g)}">${esc(g)}</option>`).join('');
  
  const fInv = document.getElementById('fInv');
  if (fInv) fInv.innerHTML = '<option value="">Tous inventoristes</option>' + invs.map(i => `<option value="${esc(i)}">${esc(i)}</option>`).join('');
  
  const fLoc = document.getElementById('fLoc');
  if (fLoc) fLoc.innerHTML = '<option value="">Toutes localisations</option>' + locs.map(l => `<option value="${esc(l)}">${esc(l)}</option>`).join('');
  
  if (prevGare && fGare) fGare.value = prevGare;
  if (prevInv && fInv) fInv.value = prevInv;
  if (prevLoc && fLoc) fLoc.value = prevLoc;
}

function applyFilters() {
  const src = document.getElementById('fSrc')?.value || '';
  const obs = document.getElementById('fObs')?.value || '';
  const gare = document.getElementById('fGare')?.value || '';
  const inv = document.getElementById('fInv')?.value || '';
  const loc = document.getElementById('fLoc')?.value || '';
  const srch = document.getElementById('srch')?.value || '';
  const srchLower = srch.toLowerCase().trim();
  
  filteredData = zoneData.filter(r => {
    const ov = obsVal(r);
    if (src && r.Source !== src) return false;
    if (gare && gareVal(r) !== gare) return false;
    if (inv && invVal(r) !== inv) return false;
    if (loc && locVal(r) !== loc) return false;
    if (obs === 'vide' && ov) return false;
    if (obs === 'DISCORDANCE' && !ov.startsWith('DISCORDANCE')) return false;
    if (obs && obs !== 'vide' && obs !== 'DISCORDANCE' && ov !== obs) return false;
    if (srchLower) {
      const h = Object.keys(r).map(k => {
        const v = r[k];
        return v instanceof Date ? v.toLocaleDateString('fr') : (v == null ? '' : v.toString());
      }).join(' ').toLowerCase();
      if (!h.includes(srchLower)) return false;
    }
    return true;
  });
  
  page = 1;
  renderTable();
}

function obsBadge(v) {
  const u = (v || '').toString().toUpperCase().trim();
  if (u === 'CONFORME') return `<span class="obs-ok">CONFORME</span>`;
  if (u === 'A VERIFIER') return `<span class="obs-av">A VÉRIFIER</span>`;
  if (u.startsWith('DISCORDANCE')) return `<span class="obs-disc">${esc(v) || 'DISCORDANCE'}</span>`;
  return `<span class="obs-nd">—</span>`;
}

function renderCell(r, c) {
  if (c === 'Source') return `<td><span class="src-${(r.Source||'').toLowerCase()}">${r.Source||'—'}</span></td>`;
  if (c === 'Observation') return `<td>${obsBadge(r.Observation)}</td>`;
  if (/date/i.test(c)) {
    let dateValue = r[c];
    if (dateValue) {
      if (typeof dateValue === 'string' && isFrenchDateTime(dateValue)) {
        dateValue = dateValue;
      } else if (dateValue instanceof Date) {
        dateValue = formatDateToFrench(dateValue);
      } else if (typeof dateValue === 'string' && dateValue.includes('GMT')) {
        const parsedDate = new Date(dateValue);
        if (!isNaN(parsedDate.getTime())) {
          dateValue = formatDateToFrench(parsedDate);
        }
      } else if (typeof dateValue === 'string' && /^\d{4}-\d{2}-\d{2}/.test(dateValue)) {
        dateValue = formatDateToFrench(new Date(dateValue));
      }
    }
    return `<td style="font-family:var(--mono);font-size:10px">${dateValue || '—'}</td>`;
  }
  return `<td>${esc(r[c])||'—'}</td>`;
}

function buildTableHead() {
  const cols = displayCols();
  let h = cols.map(c => `<th onclick="sortTbl('${c.replace(/'/g, "\\'")}')">
    ${esc(c === 'Source' ? 'ZONE' : c)}${sortCol === c ? ` <span style="opacity:.4;font-size:8px">${sortDir === 1 ? '▲' : '▼'}</span>` : ''}
  </th>`).join('');
  if (isAdmin) h = `<th class="th-act">✏</th>` + h;
  const tblHead = document.getElementById('tblHead');
  if (tblHead) tblHead.innerHTML = h;
}

function sortTbl(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  filteredData.sort((a, b) => (a[col] || '').toString().localeCompare((b[col] || '').toString(), 'fr', { numeric: true }) * sortDir);
  renderTable();
}

function changePageSize() {
  const v = document.getElementById('pageSize')?.value;
  PG = v === 'all' ? Number.MAX_SAFE_INTEGER : (+v || 50);
  page = 1;
  renderTable();
}

function renderTable() {
  buildTableHead();
  const cols = displayCols();
  const n = filteredData.length;
  const pages = Math.max(1, Math.ceil(n / PG));
  if (page > pages) page = pages;
  const slice = PG >= n ? filteredData : filteredData.slice((page - 1) * PG, page * PG);
  
  const tblCount = document.getElementById('tblCount');
  if (tblCount) tblCount.textContent = `${fmt(n)} articles`;
  
  const colSpan = cols.length + (isAdmin ? 1 : 0);
  const tBody = document.getElementById('tBody');
  
  if (tBody) {
    if (n === 0) {
      tBody.innerHTML = `<tr><td colspan="${Math.max(1, colSpan)}" style="text-align:center;color:var(--tx3);padding:2rem">Aucun résultat</td></tr>`;
    } else {
      const rowsHtml = slice.map((r, idx) => {
        const gi = zoneData.indexOf(r);
        const cells = cols.map(c => renderCell(r, c)).join('');
        if (!isAdmin) {
          return `<tr class="clickable-row" data-row-index="${gi}">${cells}</tr>`;
        }
        return `<tr class="clickable-row" data-row-index="${gi}"><td class="td-act"><button class="btn-tbl-edit" onclick="openEditModal(${gi})" title="Modifier cette ligne">✏</button></td>${cells}<tr>`;
      }).join('');
      tBody.innerHTML = rowsHtml;
      
      document.querySelectorAll('#tBody .clickable-row').forEach(row => {
        row.addEventListener('click', (e) => {
          if (e.target.tagName === 'BUTTON' || e.target.closest('.btn-tbl-edit')) return;
          const idx = row.getAttribute('data-row-index');
          if (idx !== null) openEditModal(parseInt(idx));
        });
      });
    }
  }
  
  const pagInfo = document.getElementById('pagInfo');
  if (pagInfo) pagInfo.textContent = PG >= n ? `${fmt(n)} résultats` : `Page ${page}/${pages} — ${fmt(n)} résultats`;
  
  if (PG >= n) {
    const pagBtns = document.getElementById('pagBtns');
    if (pagBtns) pagBtns.innerHTML = '';
    return;
  }
  
  const rp = [...new Set([1, page - 1, page, page + 1, pages].filter(p => p >= 1 && p <= pages))].sort((a, b) => a - b);
  let html = `<button class="pb" onclick="goPage(${page - 1})" ${page === 1 ? 'disabled' : ''}>‹</button>`;
  let prev = null;
  rp.forEach(p => {
    if (prev && p - prev > 1) html += `<span style="color:var(--tx3);padding:0 4px;font-size:10px">…</span>`;
    html += `<button class="pb${p === page ? ' on' : ''}" onclick="goPage(${p})">${p}</button>`;
    prev = p;
  });
  html += `<button class="pb" onclick="goPage(${page + 1})" ${page === pages ? 'disabled' : ''}>›</button>`;
  
  const pagBtns = document.getElementById('pagBtns');
  if (pagBtns) pagBtns.innerHTML = html;
}

function goPage(p) {
  const pages = Math.max(1, Math.ceil(filteredData.length / PG));
  if (p < 1 || p > pages) return;
  page = p;
  renderTable();
}

function submitModal() {
  const row = zoneData[modalRowIndex];
  const zone = modalZone || (row && row.Source) || currentZone;
  const headers = sourceHeaders.filter(h => h && h !== 'Source');
  const data = {};
  
  const serie = document.getElementById('mf_serie')?.value || '';
  const libelle = document.getElementById('mf_libelle')?.value || '';
  const codeArticle = document.getElementById('mf_code_article')?.value || '';
  const marche = document.getElementById('mf_marche')?.value || '';
  const pu = document.getElementById('mf_pu')?.value || '';
  const marque = document.getElementById('mf_marque')?.value || '';
  const modele = document.getElementById('mf_modele')?.value || '';
  const inventoriste = document.getElementById('mf_inventoriste')?.value || '';
  const dateInventaire = document.getElementById('mf_date_inventaire')?.value || '';
  
  const obsSelect = document.getElementById('mf_obs_sel');
  let observation = obsSelect?.value || '';
  if (observation === 'DISCORDANCE') {
    const discInput = document.getElementById('mf_obs_disc_input');
    if (discInput && discInput.value.trim()) {
      observation = 'DISCORDANCE ' + discInput.value.trim();
    }
  }
  
  headers.forEach(h => {
    const hUpper = h.toUpperCase();
    if (h === 'Numerie' || h === 'NUMERIE' || h === 'COM-ALU') data[h] = serie;
    else if (h === 'Lib_Article' || h === 'LIB_ARTICLE' || h === 'Libellé article') data[h] = libelle;
    else if (h === 'Cod_Article' || h === 'COD_ARTICLE' || h === 'Code article') data[h] = codeArticle;
    else if (h === 'Marche' || h === 'N° Marché' || h === 'N_MARCHE') data[h] = marche;
    else if (h === 'PU' || h === 'Prix') data[h] = pu;
    else if (h === 'Marque' || h === 'LIB_MARQUE') data[h] = marque;
    else if (h === 'Modele' || h === 'LIB_MODELE' || h === 'Modèle') data[h] = modele;
    else if (h === 'Inventoriste' || h === 'INVENTORISTE') data[h] = inventoriste;
    else if (h === 'Date_inventaire' || h === "Date d'inventaire" || h === 'DATE_INVENTAIRE') data[h] = dateInventaire;
    else if (h === 'Observation' || h === 'OBSERVATION') data[h] = observation;
  });
  
  const nonModifiable = ['Localisation', 'LOCALISATION', 'Gare', 'GARE', 'Date_modification', 'Date de modification', 'ID_Imobilisation', 'ID_Immobilisation'];
  
  const changes = headers.filter(h => {
    if (nonModifiable.includes(h)) return false;
    const newVal = (data[h] != null ? data[h] : '').toString();
    const oldVal = (row[h] != null ? row[h] : '').toString();
    return newVal !== oldVal;
  });
  
  if (changes.length === 0) {
    toast('Aucune modification détectée', 'info');
    return;
  }
  
  const idImmo = row.ID_Imobilisation || row.ID_Immobilisation || row['ID Immobilisation'] || '';

  if (row.Lib_Article) msg += `<p><strong>📦 Libellé :</strong> ${esc(row.Lib_Article)}</p>`;
  msg += `<p><strong>✏️ Champs modifiés :</strong> ${changes.join(', ')}</p>`;
  
  const now = new Date();
  const dateComplete = now.toLocaleString('fr-FR', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
  msg += `<p><strong>📅 Nouvelle date de modification :</strong> ${dateComplete}</p>`;
  
  const zoneRows = zoneData.filter(r => r.Source === zone);
  const idxInZone = zoneRows.indexOf(row);
  const sheetRow = idxInZone + 2;
  
  pendingAction = { 
    type: 'update', 
    rowIndex: sheetRow, 
    data, 
    zone, 
    globalIdx: modalRowIndex,
    dateModification: dateComplete
  };
  closeModal();
  openConfirm(msg, '✏️', 'Confirmer la modification', 'var(--grad)', '✓ Enregistrer');

function openConfirm(msg, icon = '⚠️', title = 'Confirmer', btnGrad = 'var(--grad)', btnLabel = '✓ Confirmer') {
  const confirmIcon = document.getElementById('confirmIcon');
  const confirmTitle = document.getElementById('confirmTitle');
  const confirmMsg = document.getElementById('confirmMsg');
  const confirmBox = document.getElementById('confirmBox');
  const okBtn = document.getElementById('confirmOkBtn');
  
  if (confirmIcon) confirmIcon.textContent = icon;
  if (confirmTitle) confirmTitle.textContent = title;
  if (confirmMsg) {
    confirmMsg.innerHTML = `<div style="text-align:left; line-height:1.6;">${msg}</div>`;
  }
  
  if (confirmBox && okBtn) {
    if (btnGrad === 'var(--red)') {
      confirmBox.classList.add('danger');
      okBtn.className = 'btn btn-red';
    } else {
      confirmBox.classList.remove('danger');
      okBtn.className = 'btn btn-acc';
    }
    okBtn.textContent = btnLabel;
  }
  
  const overlay = document.getElementById('confirmOverlay');
  if (overlay) overlay.style.display = 'flex';
}

function closeConfirm() {
  const overlay = document.getElementById('confirmOverlay');
  if (overlay) overlay.style.display = 'none';
  pendingAction = null;
}

async function executeConfirmed() {
  if (!pendingAction) return;
  const action = pendingAction;
  closeConfirm();
  
  const cfg = ZONE_CONFIG[action.zone];
  if (!cfg || !cfg.apiUrl) {
    toast('URL Apps Script manquante pour ' + action.zone, 'err');
    return;
  }
  
  captureFilters();
  toast('⏳ Enregistrement...', 'info');
  
  try {
    const res = await fetch(cfg.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        token: SECRET_TOKEN,
        zone: action.zone,
        action: action.type,
        rowIndex: action.rowIndex,
        data: action.data
      })
    });
    
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const result = await res.json();
    
    if (result.success) {
      toast('✓ ' + result.message);
      if (action.type === 'update') {
        patchZoneDataRow(action.zone, action.rowIndex, action.data);
        if (result.dateModification) {
          const row = zoneData[action.globalIdx];
          for (const key in row) {
            if (key === 'Date modification' || key === 'Date_Modification' || 
                key === 'Date de modification' || key === 'Date_modification' ||
                (key && key.toLowerCase().includes('date') && key.toLowerCase().includes('modif'))) {
              row[key] = result.dateModification;
              break;
            }
          }
        }
      } else if (action.type === 'delete') {
        removeZoneDataRow(action.zone, action.rowIndex);
      }
      
      populateFilters();
      restoreFilters();
      applyFilters();
      
      const maxPages = Math.max(1, Math.ceil(filteredData.length / PG));
      page = Math.min(savedPage, maxPages);
      renderTable();
      buildKPIs();
      if (isAdmin) buildAdminZoneCards();
    } else {
      toast('Erreur : ' + (result.error || 'Inconnue'), 'err');
    }
  } catch (e) {
    toast('Erreur réseau — ' + e.message, 'err');
    console.error('DRRO API:', e);
  }
  pendingAction = null;
}

function patchZoneDataRow(zone, sheetRowIndex, newData) {
  const realIdx = sheetRowIndex - 2;
  const zoneRows = zoneData.filter(r => r.Source === zone);
  if (realIdx < 0 || realIdx >= zoneRows.length) return false;
  const target = zoneRows[realIdx];
  const globalIdx = zoneData.indexOf(target);
  if (globalIdx === -1) return false;
  Object.keys(newData).forEach(k => { zoneData[globalIdx][k] = newData[k]; });
  return true;
}

function removeZoneDataRow(zone, sheetRowIndex) {
  const realIdx = sheetRowIndex - 2;
  const zoneRows = zoneData.filter(r => r.Source === zone);
  if (realIdx < 0 || realIdx >= zoneRows.length) return false;
  const target = zoneRows[realIdx];
  const globalIdx = zoneData.indexOf(target);
  if (globalIdx === -1) return false;
  zoneData.splice(globalIdx, 1);
  return true;
}

function exportData(data, name) {
  if (!data.length) {
    toast('Aucune donnée à exporter', 'err');
    return;
  }
  
  const cols = displayCols();
  const ordered = data.map(r => {
    const o = {};
    cols.forEach(c => { o[c] = (r[c] == null ? '' : r[c]); });
    return o;
  });
  
  const ws = XLSX.utils.json_to_sheet(ordered, { header: cols });
  ws['!cols'] = cols.map(c => {
    let w = c.length;
    ordered.forEach(o => {
      const v = (o[c] == null ? '' : o[c]).toString();
      if (v.length > w) w = v.length;
    });
    return { wch: Math.min(60, Math.max(10, w + 2)) };
  });
  
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'ARTICLES');
  XLSX.writeFile(wb, name + '_' + new Date().toISOString().slice(0, 10) + '.xlsx');
  toast('Export téléchargé — ' + fmt(data.length) + ' lignes');
}

// ============================================================
// TABS
// ============================================================

function showTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  const panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.add('on');
  const tabs = document.querySelectorAll('.tab');
  const idx = { 'overview': 0, 'tableau': 1, 'telechargement': 2 }[id];
  if (idx != null && tabs[idx]) tabs[idx].classList.add('on');
  setTimeout(syncStickyHeights, 50);
}

// ============================================================
// INIT
// ============================================================

initTheme();
(function() {
  const f = document.getElementById('loginFooterDate');
  if (f) f.textContent = new Date().toLocaleDateString('fr');
})();

window.addEventListener('load', () => {
  initTheme();
  setProgress(100, 'Prêt');
  setTimeout(() => {
    const loadScreen = document.getElementById('loadScreen');
    if (loadScreen) loadScreen.style.display = 'none';
    const s = readSession();
    if (s && ZONE_CONFIG[s.zone]) {
      currentZone = s.zone;
      isAdmin = (currentZone === 'ADMIN');
      selectedLoginZone = s.zone;
      launchApp();
      startSessionCountdown(s.expiry);
    } else {
      const loginScreen = document.getElementById('loginScreen');
      if (loginScreen) loginScreen.style.display = 'flex';
    }
  }, 700);
});

window.addEventListener('resize', syncStickyHeights);
</script>
