<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRRO — INVENTAIRE 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root,html[data-theme="light"]{
  --bg:#F7FAFC;--s1:#FFFFFF;--s2:#F8FAFC;--s3:#EDF2F7;--bd:#E2E8F0;--bd2:#CBD5E0;
  --acc:#1A365D;--acc2:#DD6B20;--acc3:#38A169;--amber:#B7791F;--red:#C53030;--blue:#2C5282;
  --tx:#0F2645;--tx2:#2C5282;--tx3:#718096;--gold:#F6CB46;--thead:#EDF2F7;
  --shadow-sm:0 1px 3px rgba(26,54,93,.08);--shadow:0 6px 22px -8px rgba(26,54,93,.16);
  --shadow-lg:0 18px 48px -16px rgba(26,54,93,.24);--grad:linear-gradient(135deg,#1A365D,#2C5282);
  --mono:'IBM Plex Mono',ui-monospace,monospace;--sans:'Inter',system-ui,sans-serif;
  --r:8px;--r2:12px;--r3:16px;
  --header-h:54px;--nav-h:42px;--tblhdr-h:64px;
}
html[data-theme="dark"]{
  --bg:#0F172A;--s1:#162033;--s2:#1C2840;--s3:#24324F;--bd:#334155;--bd2:#475569;
  --acc:#5B9BFF;--acc2:#FB923C;--acc3:#4ADE80;--amber:#F6CB46;--red:#F87171;--blue:#60A5FA;
  --tx:#F8FAFC;--tx2:#CBD5E1;--tx3:#94A3B8;--gold:#FFD95A;--thead:#1E293B;
  --shadow-sm:0 1px 3px rgba(0,0,0,.35);--shadow:0 6px 22px -8px rgba(0,0,0,.50);
  --shadow-lg:0 18px 48px -16px rgba(0,0,0,.65);--grad:linear-gradient(135deg,#274C7A,#3B6AA6);
}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;font-size:14px;transition:background .3s,color .3s}
:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:6px}
*{scrollbar-width:thin;scrollbar-color:var(--bd2) transparent}
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:8px;border:2px solid var(--bg)}

/* ══ LOADING ══ */
#loadScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
#loadScreen>div{width:420px;max-width:90vw;text-align:center}
.spinner{width:52px;height:52px;margin:24px auto;border:3px solid var(--bd);border-top:3px solid var(--acc);border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-bar{width:100%;height:8px;background:var(--s3);border:1px solid var(--bd);border-radius:999px;overflow:hidden}
.load-fill{width:0%;height:100%;background:var(--grad);border-radius:999px;transition:width .3s ease}

/* ══ LOGIN ══ */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:9998;display:none;flex-direction:column;align-items:center;justify-content:center}
.login-box{background:var(--s1);border:1.5px solid var(--bd);border-radius:var(--r3);padding:36px 44px;width:100%;max-width:460px;box-shadow:var(--shadow-lg);position:relative}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--grad)}
.login-zone-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:20px 0}
.zone-btn{border:1.5px solid var(--bd);border-radius:var(--r2);padding:16px 8px;text-align:center;cursor:pointer;background:var(--s2);transition:.18s}
.zone-btn.sel{border-color:var(--acc);background:var(--s3);box-shadow:0 0 0 3px rgba(26,54,93,.18)}
.admin-zone { border: 2px solid #f5cc72; background: #fffbea; color: #854f0b; width: 100%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border-radius: var(--r2); cursor: pointer; }
.admin-zone.sel { border-color: var(--gold); background: #fff5cc; }

/* ══ HEADER ══ */
header{background:var(--s1);border-bottom:1.5px solid var(--bd);height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:300;box-shadow:var(--shadow-sm)}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.1em;color:var(--tx);display:flex;align-items:center;gap:12px;min-width:0;flex:0 0 auto!important}
.status-dot{width:7px;height:7px;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ══ NAV TABS ══ */
nav{background:var(--s1);border-bottom:1.5px solid var(--bd);display:flex;padding:5px 24px;gap:2px;position:sticky;top:var(--header-h);z-index:290;box-shadow:0 2px 8px -4px rgba(26,54,93,.08)}
.tab{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:8px 18px;cursor:pointer;color:var(--tx3);border:none;background:none;border-radius:var(--r);transition:.15s}
.tab.on{color:#fff;background:var(--grad)}

/* ══ TABLE PANEL ══ */
main{padding:0!important;width:100%;max-width:100%!important}
.panel:not(#panel-tableau){padding:20px}
#panel-tableau{display:none;flex-direction:column;height:calc(100vh - var(--header-h) - var(--nav-h));overflow:hidden;width:100%}
#panel-tableau.on{display:flex}
.tbl-hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:15px;position:sticky;top:0;z-index:280;width:100%;box-shadow:var(--shadow-sm);flex-shrink:0}
.tbl-body-wrap{flex:1;min-height:0;display:flex;flex-direction:column;overflow:auto;background:var(--s1);width:100%}
table{width:100%;border-collapse:separate;border-spacing:0;table-layout:auto}
thead th{background:var(--thead);padding:12px 15px;text-align:left;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;border-bottom:1.5px solid var(--bd);white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;z-index:150;box-shadow:0 2px 0 var(--bd)}
tbody tr:hover td{background:var(--s3)}
td{padding:10px 15px;color:var(--tx2);border-bottom:1px solid var(--bd);font-size:12px;white-space:nowrap}

/* Actions Buttons */
.btn-edit-row{background:color-mix(in srgb,var(--blue) 12%,var(--s1));border:1px solid var(--blue);color:var(--blue);border-radius:5px;padding:3px 8px;font-size:10px;cursor:pointer}
.btn-del-row{background:color-mix(in srgb,var(--red) 12%,var(--s1));border:1px solid var(--red);color:var(--red);border-radius:5px;padding:3px 8px;font-size:10px;cursor:pointer;margin-left:4px}

/* ══ MODAL EDIT/ADD ══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:5000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--s1);border:1.5px solid var(--bd);border-radius:var(--r3);padding:28px 32px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);position:relative}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--grad)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-field label{display:block;font-family:var(--mono);font-size:9px;font-weight:600;text-transform:uppercase;color:var(--tx3);margin-bottom:5px}
.modal-field input, .modal-field select{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--r);padding:8px 12px;font-size:12px;color:var(--tx);outline:none}

/* ══ CONFIRM ══ */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:6000;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:var(--s1);border:1.5px solid var(--red);border-radius:var(--r3);padding:28px 32px;width:100%;max-width:440px;text-align:center}
.confirm-btn-ok{background:var(--red);color:#fff;border:none;border-radius:var(--r);padding:10px 20px;font-weight:700;cursor:pointer}

/* ══ KPI ══ */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--s1);border:1.5px solid var(--bd);border-radius:var(--r2);padding:18px;border-top:4px solid var(--kpi-color)}
.kpi-val{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--kpi-color)}

/* ══ UTILS ══ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);font-size:12px;font-family:var(--mono);font-weight:600;cursor:pointer;border:none;transition:.15s}
.btn-acc{background:var(--grad);color:#fff}.btn-out{background:transparent;border:1.5px solid var(--bd);color:var(--tx2)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--acc3);color:#fff;padding:10px 18px;border-radius:var(--r);font-family:var(--mono);font-size:12px;opacity:0;transition:.2s;z-index:9999}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{background:var(--red)}

/* Print */
@media print {
  header, nav, .tbl-hdr, .pag, #loginScreen, #loadScreen { display:none !important }
  #panel-overview { display:block !important; width:100% !important; }
}
</style>
</head>
<body class="dark-theme">

<!-- LOADING -->
<div id="loadScreen">
  <div>
    <div style="font-family:var(--mono);font-size:40px;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:0.2em">DRRO</div>
    <div class="spinner"></div>
    <div class="load-bar"><div class="load-fill" id="loadFill"></div></div>
    <div id="loadStatus" style="font-family:var(--mono);font-size:12px;color:var(--tx3);margin-top:15px">Chargement...</div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:22px"><div style="font-family:var(--mono);font-size:28px;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">DRRO 2026</div></div>
    <div class="login-zone-grid">
      <div class="zone-btn" id="zb-CEBS" onclick="selZone('CEBS')"><div class="zone-btn-icon">📘</div><div class="zone-btn-label">CEBS</div></div>
      <div class="zone-btn" id="zb-CEJ"  onclick="selZone('CEJ')"><div class="zone-btn-icon">📗</div><div class="zone-btn-label">CEJ</div></div>
      <div class="zone-btn" id="zb-AEBB" onclick="selZone('AEBB')"><div class="zone-btn-icon">📙</div><div class="zone-btn-label">AEBB</div></div>
    </div>
    <div class="admin-zone" id="zb-ADMIN" onclick="selZone('ADMIN')">🧭 TOUTES ZONES</div>
    <div id="loginErr" class="login-err"></div>
    <div style="text-align:left;margin-bottom:15px"><label style="font-size:10px;text-transform:uppercase;color:var(--tx3)">Code d'accès</label><input type="password" id="passInput" onkeydown="if(event.key==='Enter')doLogin()" style="width:100%;padding:12px;border-radius:8px;border:1px solid var(--bd);margin-top:5px;background:var(--s2);color:var(--tx)"></div>
    <button class="login-btn" onclick="doLogin()">Accéder →</button>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell" style="display:none">
<header>
  <div class="logo" style="gap:15px">
    <span style="font-size:22px;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;width:85px;flex:0 0 85px">DRRO</span>
    <span style="width:1.5px;height:24px;background:var(--bd2);flex:0 0 1.5px"></span>
    <div style="display:flex;flex-direction:column;line-height:1.2;min-width:150px">
      <span style="font-size:12px;font-weight:700">INVENTAIRE 2026</span>
      <span style="font-size:9px;color:var(--tx3)">ELASSALI IDRISS</span>
    </div>
  </div>
  <div class="hdr-right">
    <span id="hdrZoneBadge" class="zone-badge-hdr"></span>
    <div class="status-dot" id="statusDot"></div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="btn btn-out" onclick="reloadData()" id="refreshBtn">↺ Actualiser</button>
    <button class="btn" style="color:var(--red);border-color:var(--red)" onclick="logout()">⎋ Quitter</button>
  </div>
</header>

<nav id="mainNav"></nav>

<main>
  <div class="panel on" id="panel-overview">
    <div class="kpi-grid" id="kpiContainer"></div>
    <div class="charts-grid">
      <div class="card"><div class="card-title">Observations</div><canvas id="cObs" height="250"></canvas></div>
      <div class="card"><div class="card-title">Top Inventoristes</div><canvas id="cInv" height="250"></canvas></div>
    </div>
  </div>

  <div class="panel" id="panel-tableau">
    <div class="tbl-hdr">
      <span id="tblCount" style="font-family:var(--mono);font-size:11px;color:var(--tx3)"></span>
      <div style="display:flex;gap:10px">
        <button class="btn btn-grn btn-sm" id="btnAddRow" style="display:none" onclick="openAddModal()">+ Ajouter Ligne</button>
        <input type="text" id="srch" placeholder="🔍 Recherche..." oninput="applyFilters()" style="width:200px">
        <select id="fObs" onchange="applyFilters()"><option value="">Observations</option><option value="CONFORME">Conforme</option><option value="A VERIFIER">À vérifier</option><option value="DISCORDANCE">Discordance</option></select>
        <select id="fGare" onchange="applyFilters()"><option value="">Gares</option></select>
        <button class="btn btn-acc btn-sm" onclick="exportFiltered()">↓ Excel</button>
      </div>
    </div>
    <div class="tbl-body-wrap"><table><thead id="tblHead"></thead><tbody id="tBody"></tbody></table></div>
    <div class="pag">
        <span id="pagInfo" style="font-size:11px;color:var(--tx3)"></span>
        <div style="display:flex;gap:12px;align-items:center">
            <div style="font-size:10px">Lignes: <select id="pageSize" onchange="changePageSize()"><option value="50">50</option><option value="100">100</option><option value="all">Tout</option></select></div>
            <div id="pagBtns" class="pag-btns"></div>
        </div>
    </div>
  </div>

  <div class="panel" id="panel-telechargement">
    <div class="sec-title">Rapports</div>
    <div class="card" style="display:flex;align-items:center;gap:20px;margin-bottom:20px">
        <div style="font-size:30px">📄</div>
        <div style="flex:1"><b>Rapport consolidé (PDF)</b><br><small>Statistiques et graphiques.</small></div>
        <button class="btn btn-acc" onclick="window.print()">🖨️ Générer PDF</button>
    </div>
    <div class="sec-title">Sources Excel</div>
    <div class="dl-grid" id="dlGrid"></div>
  </div>
</main>
</div>

<!-- MODAL EDIT/ADD -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle" style="font-weight:700;margin-bottom:20px">Modifier la ligne</div>
    <div class="modal-grid" id="modalFields"></div>
    <div class="modal-btns">
      <button class="btn btn-out" onclick="closeModal()">Annuler</button>
      <button class="btn btn-acc" onclick="submitModal()" id="modalSubmitBtn">Enregistrer</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay" style="display:none">
  <div class="confirm-box">
    <div id="confirmMsg" style="margin-bottom:20px;font-size:13px"></div>
    <div style="margin-bottom:15px"><label style="font-size:10px;display:block;margin-bottom:5px">Tapez <b>CONFIRMER</b></label><input type="text" id="confirmInput" oninput="checkConfirm()" style="text-align:center;width:100%"></div>
    <div style="display:flex;gap:10px;justify-content:center"><button class="btn btn-out" onclick="closeConfirm()">Annuler</button><button class="confirm-btn-ok" id="confirmBtn" disabled onclick="executeConfirmed()">Valider</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════
// CONFIGURATION API (MODIFIEZ ICI)
// ════════════════════════════════════════════════
const API_URL = "https://script.google.com/macros/s/AKfycbw6Tj_vI5-H6fOa5B-1aK1Z3yW9eA2Z_eW9v_eE_vE/exec"; // VOTRE URL APPS SCRIPT
const API_TOKEN = "DRRO_2026_IDRISS_SECRET"; // VOTRE TOKEN SECRET

const ZONE_CONFIG = {
  CEBS:{pass:"Y2ViczIwMjY=", id:"1hGZL1ZLk37rIB6C2u15WxqTloAuO6WaCpLICQIKdiUY", color:"#1a4fa8", badgeClass:"src-cebs"},
  CEJ:{pass:"Y2VqMjAyNg==", id:"1G-TJ1MVf0pA2bnQbMdppSt8HiczPlOgG", color:"#5b3dc4", badgeClass:"src-cej"},
  AEBB:{pass:"YWViYjIwMjY=", id:"1ORIJXPdWMeADALzeElDvxUl_Fqy3Nfwv", color:"#1d9e75", badgeClass:"src-aebb"},
  ADMIN:{pass:"ZHJyb0BhZG1pbjIwMjY=", color:"#c8951a"}
};

let STATE = { zone:null, isAdmin:false, data:[], filtered:[], charts:{}, page:1, pgSize:50, headers:[], pendingAction:null };

// ═══════════ AUTH ═══════════
function selZone(z) {
    STATE.zone = z;
    document.querySelectorAll('.zone-btn, .admin-zone').forEach(b => b.classList.remove('sel'));
    const btn = document.getElementById(z === 'ADMIN' ? 'zb-ADMIN' : 'zb-' + z);
    if(btn) btn.classList.add('sel');
}

function doLogin() {
    const input = document.getElementById('passInput').value.trim();
    if(!STATE.zone || !input) return;
    if(btoa(input) === ZONE_CONFIG[STATE.zone].pass) {
        localStorage.setItem('drro_session_v5', JSON.stringify({z: STATE.zone, t: Date.now()}));
        launchApp();
    } else { alert("Code incorrect"); }
}

async function launchApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appShell').style.display = 'block';
    STATE.isAdmin = (STATE.zone === 'ADMIN');
    document.getElementById('hdrZone').textContent = STATE.zone;
    document.getElementById('btnAddRow').style.display = STATE.isAdmin ? 'inline-flex' : 'none';
    buildNav(); buildDlSection(); reloadData();
}

function buildNav() {
    document.getElementById('mainNav').innerHTML = `<button class="tab on" onclick="showTab('overview')">Vue d'ensemble</button><button class="tab" onclick="showTab('tableau')">Données</button><button class="tab" onclick="showTab('telechargement')">Téléchargement</button>`;
}

// ═══════════ DATA ═══════════
async function reloadData() {
    document.getElementById('loadScreen').style.display = 'flex';
    document.getElementById('loadFill').style.width = "30%";
    const zs = STATE.isAdmin ? ['CEBS','CEJ','AEBB'] : [STATE.zone];
    STATE.data = [];
    
    for(let z of zs) {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${ZONE_CONFIG[z].id}/export?format=xlsx`);
            const buf = await res.arrayBuffer();
            const wb = XLSX.read(buf);
            const ws = wb.Sheets['ARTICLES'] || wb.Sheets[0];
            const json = XLSX.utils.sheet_to_json(ws, {defval:''});
            if(!STATE.headers.length) STATE.headers = Object.keys(json[0]||{});
            // On stocke l'index réel (json index + 2 pour header Excel)
            STATE.data = STATE.data.concat(json.map((r, i) => ({ ...r, _Source: z, _rowIdx: i + 2 })));
        } catch(e) { console.error(e); }
    }
    document.getElementById('loadFill').style.width = "100%";
    setTimeout(() => { document.getElementById('loadScreen').style.display='none'; updateUI(); }, 500);
}

function updateUI() {
    const d=STATE.data, n=d.length;
    const ok=d.filter(r => String(r.Observation).toUpperCase().includes('CONFORME')).length;
    document.getElementById('kpiContainer').innerHTML = `
        <div class="kpi" style="--kpi-color:var(--acc)"><div class="kpi-label">Articles</div><div class="kpi-val">${n}</div></div>
        <div class="kpi" style="--kpi-color:var(--acc3)"><div class="kpi-label">Conformes</div><div class="kpi-val">${ok}</div></div>
    `;
    const gares = [...new Set(d.map(r => String(r.Gare)).filter(v => v!=='undefined'))].sort();
    document.getElementById('fGare').innerHTML = '<option value="">Gares</option>' + gares.map(g => `<option value="${g}">${g}</option>`).join('');
    renderCharts(); applyFilters();
}

function renderCharts() {
  const d=STATE.data;
  if(STATE.charts.cObs) STATE.charts.cObs.destroy();
  STATE.charts.cObs = new Chart(document.getElementById('cObs'), {
    type:'doughnut', data:{ labels:['Conforme','Autres'], datasets:[{data:[d.filter(r=>String(r.Observation).includes('CONFORME')).length, d.length], backgroundColor:['#38A169','#E2E8F0']}] }, options:{maintainAspectRatio:false}
  });
}

// ═══════════ TABLE & ACTIONS ═══════════
function applyFilters() {
    const q = document.getElementById('srch').value.toLowerCase();
    const obs = document.getElementById('fObs').value;
    const gare = document.getElementById('fGare').value;
    STATE.filtered = STATE.data.filter(r => {
        if(gare && String(r.Gare) !== gare) return false;
        if(obs && !String(r.Observation).toUpperCase().includes(obs)) return false;
        if(q && !Object.values(r).some(v => String(v).toLowerCase().includes(q))) return false;
        return true;
    });
    STATE.page = 1; renderTable();
}

function renderTable() {
    const cols = ['ID_Immobilisation', 'Lib_Article', 'NumSerie', 'Observation', 'Gare', 'Inventoriste'];
    const h = document.getElementById('tblHead');
    const b = document.getElementById('tBody');
    
    // Header
    let headHtml = (STATE.isAdmin ? '<th>Actions</th>' : '') + (STATE.isAdmin ? '<th>Zone</th>' : '');
    headHtml += cols.map(c => `<th>${c.replace('_',' ')}</th>`).join('');
    h.innerHTML = `<tr>${headHtml}</tr>`;

    // Rows
    const start = (STATE.page - 1) * STATE.pgSize;
    const slice = STATE.pgSize === 'all' ? STATE.filtered : STATE.filtered.slice(start, start + STATE.pgSize);

    b.innerHTML = slice.map((r, i) => {
        const dataIdx = STATE.data.indexOf(r);
        let row = STATE.isAdmin ? `<td style="width:80px">
            <button class="btn-edit-row" onclick="openEditModal(${dataIdx})">✏</button>
            <button class="btn-del-row" onclick="askDelete(${dataIdx})">✕</button>
        </td>` : '';
        row += STATE.isAdmin ? `<td><span class="src-${r._Source.toLowerCase()}">${r._Source}</span></td>` : '';
        row += cols.map(c => `<td class="${c==='ID_Immobilisation'?'mono':''}">${c==='Observation'?obsBadge(r[c]):(r[c]||'—')}</td>`).join('');
        return `<tr>${row}</tr>`;
    }).join('');
    
    document.getElementById('tblCount').textContent = `${STATE.filtered.length} articles`;
    renderPag();
}

function obsBadge(v) {
    if(!v) return '<span style="color:var(--tx3)">—</span>';
    const s = v.toString().toUpperCase();
    if(s.includes('CONFORME')) return `<span class="obs-ok">OK</span>`;
    if(s.includes('VERIFIER')) return `<span class="obs-av">AV</span>`;
    return `<span class="obs-disc">DISC</span>`;
}

// ═══════════ MODIFICATION LOGIC ═══════════
function openEditModal(idx) {
    const r = STATE.data[idx];
    STATE.pendingAction = { type:'update', idx: idx, zone: r._Source, row: r._rowIdx };
    document.getElementById('modalTitle').textContent = `Modifier : ${r.ID_Immobilisation || 'Ligne'}`;
    let html = '';
    STATE.headers.forEach(h => {
        const val = r[h] || '';
        html += `<div class="modal-field ${h==='Observation'?'full':''}">
            <label>${h}</label>
            ${h==='Observation' ? `<select id="m_${h}"><option value="CONFORME" ${val==='CONFORME'?'selected':''}>CONFORME</option><option value="A VERIFIER" ${val==='A VERIFIER'?'selected':''}>A VERIFIER</option><option value="DISCORDANCE" ${val.startsWith('DISC')?'selected':''}>DISCORDANCE</option></select>` : `<input type="text" id="m_${h}" value="${val}">`}
        </div>`;
    });
    document.getElementById('modalFields').innerHTML = html;
    document.getElementById('modalOverlay').style.display = 'flex';
}

function openAddModal() {
    STATE.pendingAction = { type:'add', zone: STATE.isAdmin ? 'CEBS' : STATE.zone };
    document.getElementById('modalTitle').textContent = `Ajouter un équipement`;
    let html = STATE.isAdmin ? `<div class="modal-field full"><label>Zone</label><select id="m_Zone"><option value="CEBS">CEBS</option><option value="CEJ">CEJ</option><option value="AEBB">AEBB</option></select></div>` : '';
    STATE.headers.forEach(h => {
        html += `<div class="modal-field ${h==='Observation'?'full':''}">
            <label>${h}</label>
            ${h==='Observation' ? `<select id="m_${h}"><option value="CONFORME">CONFORME</option><option value="A VERIFIER">A VERIFIER</option><option value="DISCORDANCE">DISCORDANCE</option></select>` : `<input type="text" id="m_${h}" value="">`}
        </div>`;
    });
    document.getElementById('modalFields').innerHTML = html;
    document.getElementById('modalOverlay').style.display = 'flex';
}

function submitModal() {
    const data = {};
    STATE.headers.forEach(h => { data[h] = document.getElementById('m_'+h).value; });
    if(STATE.isAdmin && STATE.pendingAction.type === 'add') STATE.pendingAction.zone = document.getElementById('m_Zone').value;
    STATE.pendingAction.data = data;
    closeModal();
    openConfirm(`Valider l'enregistrement dans ${STATE.pendingAction.zone} ?`);
}

function askDelete(idx) {
    const r = STATE.data[idx];
    STATE.pendingAction = { type:'delete', zone: r._Source, row: r._rowIdx };
    openConfirm(`Supprimer définitivement l'article ${r.ID_Immobilisation || ''} ?`);
}

async function executeConfirmed() {
    const action = STATE.pendingAction;
    closeConfirm();
    toast("Envoi au serveur...");
    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors', // Mode pour éviter les erreurs CORS Google
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
                token: API_TOKEN,
                zone: action.zone,
                action: action.type,
                rowIndex: action.row,
                data: action.data
            })
        });
        toast("✓ Action réussie (Drive synchronisé)");
        setTimeout(reloadData, 1000);
    } catch(e) { toast("Erreur réseau", "err"); }
}

// ═══════════ UI HELPERS ═══════════
function showTab(id) {
    document.querySelectorAll('.panel, .tab').forEach(el => el.classList.remove('on'));
    document.getElementById('panel-'+id).classList.add('on');
    const tabs = document.querySelectorAll('.tab');
    if(id==='overview') tabs[0].classList.add('on');
    if(id==='tableau') tabs[1].classList.add('on');
    if(id==='telechargement') tabs[2].classList.add('on');
}
function closeModal(){ document.getElementById('modalOverlay').style.display='none'; }
function openConfirm(msg){ document.getElementById('confirmMsg').textContent=msg; document.getElementById('confirmOverlay').style.display='flex'; }
function closeConfirm(){ document.getElementById('confirmOverlay').style.display='none'; }
function checkConfirm(){ document.getElementById('confirmBtn').disabled = (document.getElementById('confirmInput').value !== 'CONFIRMER'); }
function toast(m,t=""){ const el=document.getElementById('toast'); el.textContent=m; el.className='toast show '+(t==='err'?'err':''); setTimeout(()=>el.classList.remove('show'),3000); }
function toggleTheme(){ const h=document.documentElement; h.setAttribute('data-theme', h.getAttribute('data-theme')==='dark'?'light':'dark'); }
function logout(){ localStorage.removeItem('drro_session_v5'); location.reload(); }
function goPage(p){ STATE.page=p; renderTable(); }
function changePageSize(){ STATE.pgSize = document.getElementById('pageSize').value==='all'?'all':+document.getElementById('pageSize').value; STATE.page=1; renderTable(); }
function renderPag(){ const p=Math.ceil(STATE.filtered.length/STATE.pgSize); document.getElementById('pagInfo').textContent=`Page ${STATE.page}/${p}`; }

window.onload=()=>{
    const s = JSON.parse(localStorage.getItem('drro_session_v5'));
    if(s && (Date.now()-s.t < 8*3600*1000)){ STATE.zone=s.z; launchApp(); }
    else document.getElementById('loginScreen').style.display='flex';
}
</script>
